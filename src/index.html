<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game GUI</title>
    <link rel="stylesheet" href="styles/styles.scss" />
  </head>
  <body>
    <div class="page" id="game-page">
      <header class="header page__header">
        <div class="location-bar">
          <div class="tick-1"></div>
          <div class="tick-2"></div>
          <div class="tick-3"></div>
          <div class="tick-4"></div>
          <div class="tick-5"></div>
          <div class="tick-6"></div>
          <div class="tick-7"></div>
          <div class="tick-8"></div>
          <div class="tick-9"></div>
          <div class="tick-10"></div>
          <div class="tick-11"></div>
          <div class="tick-12"></div>
          <div class="tick-13"></div>
          <div class="tick-14"></div>
          <div class="tick-15"></div>
          <div class="tick-16"></div>
          <div class="tick-17"></div>
          <div class="tick-18"></div>
          <div class="tick-19"></div>
          <div class="tick-20"></div>
          <div class="tick-21"></div>
          <div class="tick-22"></div>
          <div class="tick-23"></div>
          <div class="tick-24"></div>
          <div class="tick-25"></div>
          <div class="tick-26"></div>
          <div class="tick-27"></div>
          <div class="tick-28"></div>
          <div class="tick-29"></div>
          <div class="tick-30"></div>
        </div>
        <div class="header__timer">18:29</div>
      </header>

      <main class="hud">
        <div class="interaction-panel">
          <p>
            Klawisze: <span>E</span> inventory, <span>+/-</span> jasność,
            <span>Enter</span> tekst, <span>1-5</span> sloty
          </p>
          <p>Zebrane surowce: <strong id="resource-count">0</strong></p>
        </div>

        <div class="resource-field" id="resource-field">
          <button
            class="resource-node"
            style="top: 25%; left: 22%"
            aria-label="Surowiec 1"
          ></button>
          <button
            class="resource-node"
            style="top: 42%; left: 48%"
            aria-label="Surowiec 2"
          ></button>
          <button
            class="resource-node"
            style="top: 33%; left: 72%"
            aria-label="Surowiec 3"
          ></button>
          <button
            class="resource-node"
            style="top: 58%; left: 36%"
            aria-label="Surowiec 4"
          ></button>
          <button
            class="resource-node"
            style="top: 62%; left: 66%"
            aria-label="Surowiec 5"
          ></button>
        </div>

        <div class="inventory" id="inventory" aria-hidden="true">
          <img
            class="inventory__image"
            src="../assets/inventory.png"
            alt="Inventory"
          />
        </div>

        <div class="center-message" id="center-message">🤡Don`t shoot🤡</div>

        <div class="hotbar" id="hotbar">
          <button class="hotbar__slot is-active" data-slot="1">1</button>
          <button class="hotbar__slot" data-slot="2">2</button>
          <button class="hotbar__slot" data-slot="3">3</button>
          <button class="hotbar__slot" data-slot="4">4</button>
          <button class="hotbar__slot" data-slot="5">5</button>
        </div>
      </main>
    </div>

    <script src="index.js"></script>
  </body>
</html>
